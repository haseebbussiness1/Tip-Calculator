<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tip Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>Tip Calculator</h1>

    <!-- Bill Amount -->
    <div class="field">
      <label>Bill Amount (Rs)</label>
      <input type="number" id="bill" placeholder="e.g. 1000" min="0" />
      <span class="error" id="billError"></span>
    </div>

    <!-- Tip Percentage -->
    <div class="field">
      <label>Select Tip %</label>
      <div class="tip-buttons">
        <button class="tip-btn" data-tip="10">10%</button>
        <button class="tip-btn" data-tip="15">15%</button>
        <button class="tip-btn" data-tip="20">20%</button>
      </div>
      <input type="number" id="customTip" placeholder="Custom %" min="0" />
      <span class="error" id="tipError"></span>
    </div>

    <!-- Number of People -->
    <div class="field">
      <label>Number of People</label>
      <input type="number" id="people" placeholder="e.g. 4" min="1" />
      <span class="error" id="peopleError"></span>
    </div>

    <!-- Results -->
    <div class="results">
      <div class="result-row">
        <span>Total Tip</span>
        <span id="totalTip">Rs 0.00</span>
      </div>
      <div class="result-row">
        <span>Grand Total</span>
        <span id="grandTotal">Rs 0.00</span>
      </div>
      <div class="result-row highlight">
        <span>Each Person Pays</span>
        <span id="perPerson">Rs 0.00</span>
      </div>
    </div>

    <!-- Reset Button -->
    <button id="resetBtn">Reset</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
